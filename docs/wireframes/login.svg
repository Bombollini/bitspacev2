
<svg width="1440" height="1024" viewBox="0 0 1440 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1024" fill="#FFFFFF" />
  
  <!-- Form Login -->
  <rect x="520" y="200" width="400" height="524" rx="20" fill="#FFFFFF" stroke="#000000" />
  <g transform="translate(520, 200)">
    <!-- Logo -->
    <rect x="164" y="40" width="72" height="72" rx="16" fill="none" stroke="#000000" />
    <text x="200" y="140" font-family="Arial" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">Bitspace</text>
    
    <!-- Email -->
    <text x="40" y="200" font-family="Arial" font-size="14" fill="#000000">Email</text>
    <rect x="40" y="212" width="320" height="48" rx="8" fill="none" stroke="#000000" />
    <text x="56" y="242" font-family="Arial" font-size="14" fill="#000000">alex@example.com</text>
    
    <!-- Password -->
    <text x="40" y="292" font-family="Arial" font-size="14" fill="#000000">Password</text>
    <rect x="40" y="304" width="320" height="48" rx="8" fill="none" stroke="#000000" />
    <text x="56" y="334" font-family="Arial" font-size="14" fill="#000000">••••••••••</text>
    
    <!-- Remember Me -->
    <rect x="40" y="364" width="16" height="16" rx="4" fill="none" stroke="#000000" />
    <text x="66" y="376" font-family="Arial" font-size="12" fill="#000000">Remember me</text>
    <text x="270" y="376" font-family="Arial" font-size="12" fill="#000000">Forgot password?</text>
    
    <!-- Tombol -->
    <rect x="40" y="404" width="320" height="48" rx="8" fill="none" stroke="#000000" />
    <text x="200" y="434" font-family="Arial" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">Sign In</text>
    
    <!-- Footer -->
    <text x="200" y="490" font-family="Arial" font-size="14" fill="#000000" text-anchor="middle">Don't have an account? Sign Up</text>
  </g>
</svg>