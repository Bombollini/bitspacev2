        <text x="16" y="80" font-family="Arial" font-size="12" fill="#000000">This meeting will focus on sprint planning for the Neural Network project. Key decisions will be made about task prioritization and team assignments.</text>
        
        <rect x="0" y="270" width="552" height="250" rx="8" fill="#FFFFFF" stroke="#000000" />
