        <rect x="16" y="330" width="240" height="48" rx="8" fill="none" stroke="#000000" />
        <text x="136" y="360" font-family="Arial" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle">Start Recording</text>
        <text x="16" y="410" font-family="Arial" font-size="12" fill="#000000">Auto-generate meeting notes with AI</text>
