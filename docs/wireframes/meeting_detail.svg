  <!-- Konten Utama -->
  <g transform="translate(272, 112)">
    <text x="0" y="30" font-family="Arial" font-size="32" font-weight="bold" fill="#000000">Sprint Planning</text>
    
    <!-- Meeting Info -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="1144" height="600" rx="16" fill="#FFFFFF" stroke="#000000" />
      
      <!-- Left Column -->
      <g transform="translate(24, 40)">
        <text x="0" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#000000">Meeting Details</text>
        <text x="0" y="60" font-family="Arial" font-size="12" fill="#000000">Date: Tomorrow, February 15</text>
        <text x="0" y="85" font-family="Arial" font-size="12" fill="#000000">Time: 10:00 AM - 11:00 AM</text>
        <text x="0" y="110" font-family="Arial" font-size="12" fill="#000000">Project: Neural Network</text>
        <text x="0" y="135" font-family="Arial" font-size="12" fill="#000000">Attendees: 4 people</text>
        
