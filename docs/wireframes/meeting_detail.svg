        <text x="16" y="266" font-family="Arial" font-size="12" fill="#000000">2. Plan next sprint tasks</text>
        <rect x="0" y="288" width="500" height="32" rx="8" fill="none" stroke="#000000" />
        <text x="16" y="310" font-family="Arial" font-size="12" fill="#000000">3. Assign responsibilities</text>
