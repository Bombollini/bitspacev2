
<svg width="1440" height="1024" viewBox="0 0 1440 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1024" fill="#FFFFFF" />
  
  <!-- Form Reset Password -->
  <rect x="520" y="200" width="400" height="524" rx="20" fill="#FFFFFF" stroke="#000000" />
  <g transform="translate(520, 200)">
    <!-- Logo -->
    <rect x="164" y="40" width="72" height="72" rx="16" fill="none" stroke="#000000" />
    <text x="200" y="140" font-family="Arial" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">Bitspace</text>
    
    <!-- New Password -->
    <text x="40" y="200" font-family="Arial" font-size="14" fill="#000000">New Password</text>
    <rect x="40" y="212" width="320" height="48" rx="8" fill="none" stroke="#000000" />
    <text x="56" y="242" font-family="Arial" font-size="14" fill="#000000">••••••••••</text>
    <!-- Indikator Strength -->
    <rect x="40" y="268" width="100" height="6" rx="3" fill="#000000" />
    <rect x="148" y="268" width="100" height="6" rx="3" fill="none" stroke="#000000" />
    <rect x="256" y="268" width="104" height="6" rx="3" fill="none" stroke="#000000" />
    
    <!-- Confirm Password -->
    <text x="40" y="312" font-family="Arial" font-size="14" fill="#000000">Confirm New Password</text>
    <rect x="40" y="324" width="320" height="48" rx="8" fill="none" stroke="#000000" />
    <text x="56" y="354" font-family="Arial" font-size="14" fill="#000000">••••••••••</text>
    
    <!-- Tombol -->
    <rect x="40" y="394" width="320" height="48" rx="8" fill="none" stroke="#000000" />
    <text x="200" y="424" font-family="Arial" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">Reset Password</text>
    
    <!-- Footer -->
    <text x="200" y="490" font-family="Arial" font-size="14" fill="#000000" text-anchor="middle">Back to Login</text>
  </g>
</svg>